<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
  <title>TapFolio — Digital Portfolio</title>
  <meta name="description" content="Digital portfolio powered by TapFolio." />
  <meta name="theme-color" content="#0A0A0A" id="theme-color-meta" />
  <link rel="icon" href="data:," />

  <!-- Fonts: Inter (body/UI) + Fraunces (display serif headers) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Fraunces:opsz,wght@9..144,600;9..144,900&display=swap"
    rel="stylesheet" />

  <!-- Tailwind CSS via CDN — no build tools. It watches the DOM, so
     classes injected later by our render script still get compiled. -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ["Fraunces", "serif"],
            sans: ["Inter", "ui-sans-serif", "system-ui", "sans-serif"]
          }
        }
      }
    };
  </script>

  <style>
    html,
    body {
      overflow-x: hidden;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fade-up {
      animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @media (prefers-reduced-motion: reduce) {
      .fade-up {
        animation: none;
      }
    }

    /* Matrix rain canvas sits behind everything, fades via a gradient overlay */
    #matrix-canvas {
      position: fixed;
      inset: 0;
      z-index: -10;
      pointer-events: none;
    }

    #matrix-fade {
      position: fixed;
      inset: 0;
      z-index: -9;
      pointer-events: none;
      background: linear-gradient(to bottom,
          transparent 0%,
          var(--bg, #FFFFFF) 95%);
    }

    /* Card frame: border + shadow only on desktop (md ≥ 768px) */
    #card-frame {
      border: none;
      box-shadow: none;
    }

    @media (min-width: 768px) {
      #card-frame {
        border: 2px solid var(--ink, #0A0A0A);
        box-shadow: 8px 8px 0px 0px var(--ink, #0A0A0A);
      }
    }
  </style>
</head>

<body class="font-sans antialiased pb-28">

  <!-- Matrix digital rain background -->
  <canvas id="matrix-canvas" aria-hidden="true"></canvas>
  <div id="matrix-fade"></div>

  <!-- Card frame: full-bleed on mobile, framed "card" preview on larger screens -->
  <div class="max-w-md mx-auto min-h-screen md:my-10" id="card-frame">

    <main>
      <!-- Populated by renderProfile() -->
      <section id="profile-section" class="px-6 pt-12 pb-6"></section>

      <!-- Populated by renderLinks() — vertical brutalist button stack -->
      <section id="links-section" class="px-6 py-6"></section>

      <footer class="px-6 py-10 text-center">
        <div class="inline-flex items-center gap-2 border-2 px-5 py-2.5"
          style="border-color:var(--ink); box-shadow:3px 3px 0px 0px var(--ink)">
          <span class="w-2 h-2 rounded-full" style="background:var(--accent)"></span>
          <span class="font-mono text-[11px] font-bold uppercase tracking-[0.25em]">Powered by TapFolio</span>
        </div>
      </footer>
    </main>
  </div>

  <!-- Populated by renderVCardButton() — sticky "Save Contact" bar -->
  <div id="vcard-wrap" class="fixed bottom-0 inset-x-0 z-50"
    style="border-top: 2px solid var(--ink, #0A0A0A); background-color: var(--bg, #FFFFFF);"></div>

  <!-- data.js must load BEFORE the render engine below -->
  <script src="data.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <script>
    // ==============================================================
    // RENDER ENGINE — reads window.clientData, injects every section.
    // You should not need to edit anything below this line; all
    // customization happens in data.js.
    // ==============================================================

    function hexToRgba(hex, alpha) {
      const h = hex.replace("#", "");
      const full = h.length === 3 ? h.split("").map((c) => c + c).join("") : h;
      const r = parseInt(full.substring(0, 2), 16);
      const g = parseInt(full.substring(2, 4), 16);
      const b = parseInt(full.substring(4, 6), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function applyTheme(theme) {
      const root = document.documentElement;
      root.style.setProperty("--bg", theme.bgColor);
      root.style.setProperty("--accent", theme.accentColor);
      root.style.setProperty("--ink", theme.fontColor);

      document.body.style.backgroundColor = theme.bgColor;
      document.body.style.color = theme.fontColor;
      document.getElementById("theme-color-meta").setAttribute("content", theme.bgColor);

      const cardFrame = document.getElementById("card-frame");
      // border + shadow handled by CSS media query

      const vcardWrap = document.getElementById("vcard-wrap");
      vcardWrap.style.borderColor = theme.fontColor;
      vcardWrap.style.backgroundColor = theme.bgColor;
    }

    // ── Matrix Digital Rain ──────────────────────────────────────
    function initMatrixRain(accentColor) {
      const canvas = document.getElementById("matrix-canvas");
      const ctx = canvas.getContext("2d");

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener("resize", resize);

      const fontSize = 14;
      const columns = Math.floor(canvas.width / fontSize);
      const drops = Array.from({ length: columns }, () => Math.random() * -100);

      // Characters: katakana + latin + digits
      const chars = "アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";

      function draw() {
        // Semi-transparent bg fill creates the trail / fade effect
        ctx.fillStyle = hexToRgba(clientData.theme.bgColor, 0.03);
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.font = `${fontSize}px monospace`;

        for (let i = 0; i < drops.length; i++) {
          const char = chars[Math.floor(Math.random() * chars.length)];
          const x = i * fontSize;
          const y = drops[i] * fontSize;

          // Lead character is brighter, trailing ones are subtler
          ctx.fillStyle = hexToRgba(accentColor, 0.6 + Math.random() * 0.35);
          ctx.fillText(char, x, y);

          // Reset drop to top once it reaches a random point
          if (y > canvas.height && Math.random() > 0.975) {
            drops[i] = 0;
          }
          drops[i]++;
        }

        requestAnimationFrame(draw);
      }
      draw();
    }

    function renderProfile(profile) {
      document.getElementById("profile-section").innerHTML = `
        <div class="flex flex-col items-center text-center">
          <img
            src="${profile.avatar}"
            alt="${profile.name}"
            class="fade-up w-52 h-52 object-cover border-2 rounded-lg mb-6"
            style="border-color:var(--ink); box-shadow:6px 6px 0px 0px var(--ink); animation-delay:60ms"
          />

          <h1 class="fade-up font-serif text-4xl sm:text-5xl font-black leading-[0.95] tracking-tight mb-3" style="animation-delay:120ms">
            ${profile.name}
          </h1>

          <p class="fade-up inline-block font-semibold text-xs uppercase tracking-widest px-3 py-1.5 mb-4" style="background:var(--ink); color:var(--accent); animation-delay:180ms">
            ${profile.title}
          </p>

          <p class="fade-up leading-relaxed max-w-sm opacity-80" style="animation-delay:240ms">
            ${profile.bio}
          </p>

          ${profile.location ? `
          <div class="fade-up inline-flex items-center gap-2 border-2 px-4 py-2 mt-5" style="border-color:var(--ink); box-shadow:3px 3px 0px 0px var(--ink); animation-delay:300ms">
            <i data-lucide="map-pin" class="w-4 h-4" style="color:var(--accent)"></i>
            <span class="text-xs font-semibold uppercase tracking-widest">${profile.location}</span>
          </div>
          ` : ''}
        </div>
      `;
    }

    // Custom SVG icons for platforms Lucide doesn't support (brand icons were removed)
    const customIcons = {
      instagram: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>`,
      tiktok: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12a4 4 0 1 0 4 4V4a5 5 0 0 0 5 5"/></svg>`,
      linkedin: `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect width="4" height="12" x="2" y="9"/><circle cx="4" cy="4" r="2"/></svg>`
    };

    function getLinkIcon(link) {
      const key = link.icon.toLowerCase();
      if (customIcons[key]) {
        return customIcons[key];
      }
      return `<i data-lucide="${link.icon}" class="w-5 h-5"></i>`;
    }

    function renderLinks(links) {
      const section = document.getElementById("links-section");
      section.innerHTML = links
        .map(
          (link) => `
        <a href="${link.url}" target="_blank" rel="noopener noreferrer"
           class="group flex items-center justify-between gap-3 w-full border-2 p-4 mb-3 transition-all duration-150 active:translate-x-[4px] active:translate-y-[4px]"
           style="border-color:var(--ink); box-shadow:4px 4px 0px 0px var(--ink);"
           onmouseover="this.style.background='var(--ink)'; this.style.color='var(--bg)';"
           onmouseout="this.style.background=''; this.style.color='';"
           onmousedown="this.style.boxShadow='none';"
           onmouseup="this.style.boxShadow='4px 4px 0px 0px var(--ink)';"
        >
          <span class="flex items-center gap-3 font-semibold uppercase tracking-wide text-sm">
            ${getLinkIcon(link)}
            ${link.platform}
          </span>
          <i data-lucide="arrow-up-right" class="w-4 h-4 opacity-50 group-hover:opacity-100 transition-opacity"></i>
        </a>`
        )
        .join("");
    }

    function downloadVCard(profile, vcard) {
      const parts = profile.name.trim().split(/\s+/);
      const firstName = parts[0] || "";
      const lastName = parts.slice(1).join(" ");

      const vcf = [
        "BEGIN:VCARD",
        "VERSION:3.0",
        `N:${lastName};${firstName};;;`,
        `FN:${profile.name}`,
        `TITLE:${profile.title}`,
        `TEL;TYPE=CELL:${vcard.phone}`,
        `EMAIL:${vcard.email}`,
        "END:VCARD"
      ].join("\n");

      const blob = new Blob([vcf], { type: "text/vcard" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `${profile.name.replace(/\s+/g, "-")}.vcf`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function renderVCardButton(profile, vcard) {
      const wrap = document.getElementById("vcard-wrap");
      wrap.innerHTML = `
        <div class="max-w-md mx-auto p-3 pb-[max(0.75rem,env(safe-area-inset-bottom))]">
          <button id="save-contact-btn"
             class="flex items-center justify-center gap-2 w-full font-bold uppercase tracking-wide text-sm py-4 border-2 transition-all duration-150 active:translate-x-[4px] active:translate-y-[4px]"
             style="background:var(--accent); color:var(--ink); border-color:var(--ink); box-shadow:4px 4px 0px 0px var(--ink);"
             onmousedown="this.style.boxShadow='none';"
             onmouseup="this.style.boxShadow='4px 4px 0px 0px var(--ink)';"
          >
            <i data-lucide="user-round-plus" class="w-5 h-5"></i>
            Save Contact
          </button>
        </div>
      `;
      document
        .getElementById("save-contact-btn")
        .addEventListener("click", () => downloadVCard(profile, vcard));
    }

    function render() {
      const { theme, profile, marquee, links, vcard } = clientData;

      document.title = `${profile.name} | TapFolio`;

      applyTheme(theme);
      initMatrixRain(theme.accentColor);
      renderProfile(profile);
      renderLinks(links);
      renderVCardButton(profile, vcard);

      lucide.createIcons();
    }

    render();
  </script>

</body>

</html>
